<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>UltraDash Marine Pro</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlVsdHJhRGFzaCBNYXJpbmUiLAogICJzaG9ydF9uYW1lIjogIlVsdHJhRGFzaCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDAwMDAwIiwKICAidGhlbWVfY29sb3ciOiAiIzAwMDAwMCIKfQ==">

    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #222222;
            --bordeaux: #800020;
        }

        body.night-mode {
            --bg: #050000;
            --text: var(--bordeaux);
            --accent: #2a000a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh; overflow: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        /* Dash Principal */
        #dash-screen {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }

        .big-font { font-weight: 900; line-height: 0.85; font-variant-numeric: tabular-nums; display: block; }
        #bearing { font-size: 35vw; }
        #speed { font-size: 38vw; }

        .separator { width: 70%; height: 4px; background-color: var(--accent); margin: 3vh auto; border-radius: 10px; }
        #unit { font-size: 8vw; font-weight: 300; color: var(--accent); letter-spacing: 2vw; }

        /* Botões Flutuantes */
        .fab {
            position: absolute; width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.05); color: var(--text);
            border: 1px solid var(--accent); font-size: 20px;
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        #toggleMode { top: 20px; right: 20px; }
        #openWeather { top: 20px; left: 20px; }

        /* Ecrã de Meteorologia (Overlay) */
        #weather-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000;
            display: none; flex-direction: column;
            padding: 20px; box-sizing: border-box;
            overflow-y: auto;
        }

        #weather-screen.active { display: flex; }

        .close-btn { align-self: flex-end; padding: 10px 20px; background: var(--bordeaux); color: white; border: none; border-radius: 5px; margin-bottom: 20px; }

        h2 { color: var(--bordeaux); margin: 0 0 20px 0; font-size: 1.5rem; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid var(--accent); }
        th { color: var(--bordeaux); text-transform: uppercase; font-size: 0.7rem; }
        
        .knots { font-weight: bold; color: var(--text); }

        #status-container { position: absolute; bottom: 20px; text-align: center; width: 100%; font-family: monospace; }
        #coords { font-size: 3.5vw; opacity: 0.8; margin-bottom: 5px; }
        #info { font-size: 2.5vw; color: var(--accent); }
    </style>
</head>
<body>

    <button id="toggleMode" class="fab">🌓</button>
    <button id="openWeather" class="fab">⚓</button>

    <div id="dash-screen">
        <div id="bearing" class="big-font">0°</div>
        <div class="separator"></div>
        <div id="speed" class="big-font">0</div>
        <div id="unit">KM/H</div>
        
        <div id="status-container">
            <div id="coords">LAT: --- | LON: ---</div>
            <div id="info">GPS A SINTONIZAR...</div>
        </div>
    </div>

    <div id="weather-screen">
        <button class="close-btn" onclick="toggleWeather()">FECHAR</button>
        <h2>Previsão Marítima (12h)</h2>
        <div id="weather-content">
            <table>
                <thead>
                    <tr>
                        <th>Hora</th>
                        <th>Vento (kn)</th>
                        <th>Dir.</th>
                        <th>Onda (m)</th>
                        <th>Dir.</th>
                    </tr>
                </thead>
                <tbody id="forecast-table">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const speedEl = document.getElementById('speed');
        const bearingEl = document.getElementById('bearing');
        const coordsEl = document.getElementById('coords');
        const infoEl = document.getElementById('info');
        const weatherScreen = document.getElementById('weather-screen');
        const tableBody = document.getElementById('forecast-table');

        let lastLat = null, lastLon = null, lastSpeed = 0;

        // Toggle Modo Noite
        document.getElementById('toggleMode').addEventListener('click', () => {
            document.body.classList.toggle('night-mode');
            if (navigator.vibrate) navigator.vibrate(20);
        });

        // Toggle Ecrã Meteo
        function toggleWeather() {
            weatherScreen.classList.toggle('active');
            if (weatherScreen.classList.contains('active') && lastLat) {
                fetchWeather();
            }
        }
        document.getElementById('openWeather').addEventListener('click', toggleWeather);

        async function fetchWeather() {
            tableBody.innerHTML = '<tr><td colspan="5">A carregar dados marítimos...</td></tr>';
            
            try {
                // Open-Meteo Marine API
                const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lastLat}&longitude=${lastLon}&hourly=wave_height,wave_direction,wind_speed_10m,wind_direction_10m&wind_speed_unit=kn&forecast_days=1`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.hourly) throw new Error("Sem dados");

                const now = new Date().getHours();
                let html = '';

                // Gerar as próximas 12 horas
                for (let i = now; i < now + 12; i++) {
                    const time = data.hourly.time[i].split('T')[1];
                    const windSpd = data.hourly.wind_speed_10m[i].toFixed(1);
                    const windDir = data.hourly.wind_direction_10m[i];
                    const waveH = data.hourly.wave_height[i] ? data.hourly.wave_height[i].toFixed(1) : '--';
                    const waveDir = data.hourly.wave_direction[i] ? data.hourly.wave_direction[i] + '°' : '--';

                    html += `<tr>
                        <td>${time}</td>
                        <td class="knots">${windSpd}</td>
                        <td>${windDir}°</td>
                        <td>${waveH}m</td>
                        <td>${waveDir}</td>
                    </tr>`;
                }
                tableBody.innerHTML = html;
            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="5" style="color:red">Erro: ${err.message}.<br>Verifica a ligação ou se estás longe do mar.</td></tr>`;
            }
        }

        // Sensores e GPS (Lógica consolidada anterior)
        function updatePosition(pos) {
            const { speed, heading, latitude, longitude, accuracy } = pos.coords;
            lastLat = latitude;
            lastLon = longitude;
            
            let kmh = (speed && speed > 0.5) ? Math.round(speed * 3.6) : 0;
            lastSpeed = kmh;
            speedEl.innerText = kmh;

            if (kmh >= 5 && heading !== null) {
                bearingEl.innerText = Math.round(heading) + "°";
                bearingEl.style.opacity = "1";
            }

            coordsEl.innerText = `LAT: ${latitude.toFixed(5)} | LON: ${longitude.toFixed(5)}`;
            infoEl.innerText = `PRECISÃO: ${Math.round(accuracy)}M | GPS ATIVO`;
        }

        window.addEventListener('deviceorientationabsolute', (e) => {
            if (lastSpeed < 5 && e.alpha !== null) {
                bearingEl.innerText = Math.round(360 - e.alpha) + "°";
                bearingEl.style.opacity = "0.5";
            }
        }, true);

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(updatePosition, 
                (err) => { infoEl.innerText = "ERRO GPS: " + err.message; }, 
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        }

        // Wake Lock
        let wakeLock = null;
        async function initLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
        }
        initLock();
        document.addEventListener('visibilitychange', () => { if(document.visibilityState==='visible') initLock(); });
    </script>
</body>
</html>
