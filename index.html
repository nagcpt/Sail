<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UltraDash Marine v11</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@2.1.0/css/dseg.min.css">

    <style>
        :root { 
            --bg: #000000; 
            --on: #ffffff; 
            --off: #151515; /* Segmentos fantasma */
            --glow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        body.night-mode { 
            --bg: #050000; 
            --on: #800020; 
            --off: #1a0004;
            --glow: 0 0 15px rgba(128, 0, 32, 0.5);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--on);
            font-family: Arial, sans-serif; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Botões do Topo - Posição Mockup */
        #top-nav {
            display: flex; justify-content: space-between; padding: 20px;
            position: absolute; top: 0; width: 100%; box-sizing: border-box; z-index: 100;
        }

        .icon-btn {
            background: rgba(255,255,255,0.1); border: 1px solid #333;
            color: var(--on); border-radius: 8px; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center; font-size: 22px;
        }

        /* Layout Centralizado conforme Mockup */
        #main-display {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding-top: 40px;
        }

        .label { 
            font-size: 14px; letter-spacing: 3px; opacity: 0.7; 
            font-weight: bold; margin: 10px 0;
        }

        /* Digital LCD Styles */
        .lcd-wrapper { position: relative; font-family: 'DSEG7-Classic', sans-serif; font-style: italic; }
        .lcd-ghost { color: var(--off); position: absolute; top: 0; left: 0; }
        .lcd-value { position: relative; text-shadow: var(--glow); z-index: 2; }

        #heading-box { font-size: 28vw; }
        #speed-box { font-size: 32vw; }

        .degree-symbol { 
            font-family: Arial, sans-serif; font-size: 10vw; 
            position: absolute; right: -8vw; top: 2vw; 
        }

        .separator { 
            width: 90%; height: 1px; background: var(--on); opacity: 0.3;
            margin: 20px 0; 
        }

        /* Espaçamento extra na velocidade conforme mockup */
        #speed-section { margin-top: 40px; display: flex; flex-direction: column; align-items: center; }

        /* Footer - Posição Mockup */
        #footer {
            padding: 20px 0; text-align: center; border-top: 1px solid #111;
            font-family: 'Courier New', monospace; width: 100%;
        }

        #coords { font-size: 13px; letter-spacing: 0.5px; margin-bottom: 5px; font-weight: bold; }
        #precision { font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; }

        /* Overlay Weather */
        #weather-overlay {
            position: fixed; inset: 0; background: #000; z-index: 2000; display: none;
            padding: 20px; flex-direction: column;
        }
        #weather-overlay.active { display: flex; }
        .close-btn { padding: 15px; background: var(--on); color: #000; border: none; font-weight: bold; border-radius: 4px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 5px; border-bottom: 1px solid #222; text-align: center; }
    </style>
</head>
<body>

    <div id="top-nav">
        <button id="openWeather" class="icon-btn">⚓</button>
        <button id="toggleMode" class="icon-btn">🌓</button>
    </div>

    <div id="main-display">
        <div class="label">HEADING</div>
        <div class="lcd-wrapper" id="heading-box">
            <div class="lcd-ghost">888</div>
            <div class="lcd-value"><span id="val-heading">000</span><span class="degree-symbol">°</span></div>
        </div>

        <div class="separator"></div>

        <div id="speed-section">
            <div class="lcd-wrapper" id="speed-box">
                <div class="lcd-ghost">88.8</div>
                <div class="lcd-value" id="val-speed">00.0</div>
            </div>
            <div class="label">KNOTS</div>
        </div>
    </div>

    <div id="footer">
        <div id="coords">LAT: --.----° N | LON: --.----° W</div>
        <div id="precision">PRECISÃO: --M | GPS STATUS OK</div>
    </div>

    <div id="weather-overlay">
        <button class="close-btn" onclick="toggleWeather()">VOLTAR</button>
        <div id="meteo-body"></div>
    </div>

    <script>
        const state = { lat: null, lon: null, speed: 0 };
        
        // Elementos
        const elSpeed = document.getElementById('val-speed');
        const elHeading = document.getElementById('val-heading');
        const elCoords = document.getElementById('coords');
        const elPrec = document.getElementById('precision');
        const overlay = document.getElementById('weather-overlay');

        // Modo Noite
        document.getElementById('toggleMode').onclick = () => document.body.classList.toggle('night-mode');

        // GPS
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude, speed, heading, accuracy } = pos.coords;
                state.lat = latitude;
                state.lon = longitude;
                state.speed = speed || 0;

                // Velocidade em Knots (00.0)
                let kn = state.speed * 1.94384;
                elSpeed.innerText = (kn > 0.1 ? kn.toFixed(1) : "00.0").padStart(4, '0');

                // Heading (000)
                if (heading !== null && state.speed > 0.5) {
                    elHeading.innerText = Math.round(heading).toString().padStart(3, '0');
                }

                // Coordenadas formatadas como no Mockup
                const latD = Math.abs(latitude).toFixed(4);
                const lonD = Math.abs(longitude).toFixed(4);
                elCoords.innerText = `LAT: ${latD}° ${latitude >= 0 ? 'N' : 'S'} | LON: ${lonD}° ${longitude >= 0 ? 'E' : 'W'}`;
                elPrec.innerText = `PRECISÃO: ${Math.round(accuracy)}M | GPS OK`;
            }, null, { enableHighAccuracy: true });
        }

        // Bússola
        window.addEventListener('deviceorientationabsolute', (e) => {
            if (state.speed < 1 && e.alpha !== null) {
                let h = Math.round(360 - e.alpha);
                elHeading.innerText = h.toString().padStart(3, '0');
            }
        }, true);

        // Weather
        function toggleWeather() {
            if (!state.lat) return alert("Sinal GPS insuficiente.");
            overlay.classList.toggle('active');
            if (overlay.classList.contains('active')) fetchWeather();
        }
        document.getElementById('openWeather').onclick = toggleWeather;

        async function fetchWeather() {
            const body = document.getElementById('meteo-body');
            body.innerHTML = "<p style='text-align:center'>A carregar previsões...</p>";
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${state.lat}&longitude=${state.lon}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn&timezone=auto`;
                const mar = `https://marine-api.open-meteo.com/v1/marine?latitude=${state.lat}&longitude=${state.lon}&hourly=wave_height&timezone=auto`;
                const [r1, r2] = await Promise.all([fetch(url), fetch(mar)]);
                const d1 = await r1.json(); const d2 = await r2.json();
                
                let html = "<table><tr><th>H</th><th>Kn</th><th>Dir</th><th>Onda</th></tr>";
                for (let i = new Date().getHours(); i < new Date().getHours() + 12; i++) {
                    if (!d1.hourly) break;
                    html += `<tr><td>${d1.hourly.time[i].split('T')[1]}</td><td>${d1.hourly.wind_speed_10m[i].toFixed(1)}</td><td>${d1.hourly.wind_direction_10m[i]}°</td><td>${d2.hourly ? d2.hourly.wave_height[i].toFixed(1) + 'm' : '--'}</td></tr>`;
                }
                body.innerHTML = html + "</table>";
            } catch (e) { body.innerHTML = "Erro de rede."; }
        }

        // Wake Lock
        async function wake() { try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {} }
        wake();
    </script>
</body>
</html>
