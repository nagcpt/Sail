<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>UltraDash Marine v8</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg: #000000; 
            --main-color: #ffffff; /* Letras Brancas por defeito */
            --glow: rgba(255, 255, 255, 0.3);
            --accent: #222222; 
            --bordeaux: #800020; 
        }

        body.night-mode { 
            --bg: #050000; 
            --main-color: #800020; /* Bordeaux no modo noite */
            --glow: rgba(128, 0, 32, 0.4);
            --accent: #2a000a; 
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--main-color);
            font-family: 'Share Tech Mono', monospace; height: 100vh; overflow: hidden;
            transition: all 0.4s ease;
        }

        #dash-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        
        /* Heading e Velocidade: Mesma Cor e Mesma Fonte */
        .big-font { 
            font-size: 34vw; 
            font-weight: normal; 
            line-height: 0.8; 
            color: var(--main-color);
            text-shadow: 0 0 15px var(--glow); /* Efeito de brilho digital */
            letter-spacing: -1.5vw;
        }

        .separator { 
            width: 85%; height: 2px; 
            background-color: var(--accent); 
            margin: 5vh auto; 
        }

        /* Velocidade bem afastada do separador */
        #speed-wrap { margin-top: 12vh; }

        #unit { font-size: 7vw; color: var(--accent); letter-spacing: 2vw; margin-top: 2vh; }

        /* Botões */
        .fab {
            position: absolute; width: 55px; height: 55px; border-radius: 50%;
            background: #111; color: white; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            font-family: sans-serif;
        }
        #toggleMode { top: 20px; right: 20px; }
        #openWeather { top: 20px; left: 20px; }

        /* Overlay Meteorologia */
        #weather-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 2000; display: none; flex-direction: column;
            padding: 15px; box-sizing: border-box; overflow-y: auto;
            font-family: sans-serif;
        }
        #weather-screen.active { display: flex; }
        .close-btn { padding: 15px; background: var(--bordeaux); color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
        #location-tag { font-size: 0.8rem; color: #666; margin-bottom: 15px; text-align: center; font-style: italic; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px 2px; text-align: center; border-bottom: 1px solid #111; }
        th { color: var(--bordeaux); text-transform: uppercase; font-size: 0.65rem; }

        /* Rodapé Coordenadas */
        #status-bar { position: absolute; bottom: 20px; width: 100%; text-align: center; opacity: 0.6; }
        #coords { font-size: 3.5vw; margin-bottom: 5px; letter-spacing: 1px; }
        #info { font-size: 2.5vw; text-transform: uppercase; }
    </style>
</head>
<body>

    <button id="toggleMode" class="fab">🌓</button>
    <button id="openWeather" class="fab">⚓</button>

    <div id="dash-screen">
        <div id="bearing" class="big-font">000°</div>
        
        <div class="separator"></div>
        
        <div id="speed-wrap">
            <div id="speed" class="big-font">0.0</div>
            <div id="unit">KNOTS</div>
        </div>
        
        <div id="status-bar">
            <div id="coords">LAT: --- | LON: ---</div>
            <div id="info">GPS: A LOCALIZAR...</div>
        </div>
    </div>

    <div id="weather-screen">
        <button class="close-btn" id="closeWeather">VOLTAR AO DASH</button>
        <h2 style="text-align:center; color:var(--bordeaux); margin:0;">MARINE FORECAST</h2>
        <div id="location-tag">A identificar local...</div>
        <table>
            <thead>
                <tr>
                    <th>HORA</th>
                    <th>VENTO (kn)</th>
                    <th>DIR</th>
                    <th>ONDA (m)</th>
                    <th>DIR</th>
                </tr>
            </thead>
            <tbody id="forecast-table"></tbody>
        </table>
    </div>

    <script>
        const speedEl = document.getElementById('speed');
        const bearingEl = document.getElementById('bearing');
        const coordsEl = document.getElementById('coords');
        const infoEl = document.getElementById('info');
        const weatherScreen = document.getElementById('weather-screen');
        const forecastTable = document.getElementById('forecast-table');
        const locationTag = document.getElementById('location-tag');

        let state = { lat: null, lon: null, speed: 0 };

        document.getElementById('toggleMode').onclick = () => document.body.classList.toggle('night-mode');

        async function fetchWeather() {
            forecastTable.innerHTML = '<tr><td colspan="5">A ler satélites...</td></tr>';
            locationTag.innerText = "Coordenadas: " + state.lat.toFixed(4) + ", " + state.lon.toFixed(4);
            
            try {
                // Reverse Geocoding para o Local
                fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${state.lat}&longitude=${state.lon}&count=1`)
                    .then(r => r.json()).then(data => {
                        if (data?.results?.[0]) {
                            const l = data.results[0];
                            locationTag.innerText = `Local: ${l.name} (${l.country})`;
                        }
                    }).catch(() => {});

                // Dados Meteo e Marítimos
                const landUrl = `https://api.open-meteo.com/v1/forecast?latitude=${state.lat}&longitude=${state.lon}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn&timezone=auto`;
                const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${state.lat}&longitude=${state.lon}&hourly=wave_height,wave_direction&timezone=auto`;

                const [resLand, resMarine] = await Promise.allSettled([fetch(landUrl), fetch(marineUrl)]);
                const landData = resLand.status === 'fulfilled' ? await resLand.value.json() : null;
                const marineData = resMarine.status === 'fulfilled' ? await resMarine.value.json() : null;

                let html = '';
                const now = new Date().getHours();

                for (let i = now; i < now + 12; i++) {
                    if (!landData?.hourly?.time[i]) break;
                    const time = landData.hourly.time[i].split('T')[1];
                    const wind = landData.hourly.wind_speed_10m[i].toFixed(1);
                    const windDir = landData.hourly.wind_direction_10m[i];
                    const wave = marineData?.hourly?.wave_height ? marineData.hourly.wave_height[i].toFixed(1) : '--';
                    const waveDir = marineData?.hourly?.wave_direction ? marineData.hourly.wave_direction[i] + '°' : '--';

                    html += `<tr>
                        <td>${time}</td>
                        <td style="font-weight:bold; color:var(--main-color)">${wind}</td>
                        <td>${windDir}°</td>
                        <td>${wave}</td>
                        <td>${waveDir}</td>
                    </tr>`;
                }
                forecastTable.innerHTML = html;
            } catch (err) {
                forecastTable.innerHTML = '<tr><td colspan="5">Erro ao ligar ao servidor de meteorologia.</td></tr>';
            }
        }

        document.getElementById('openWeather').onclick = () => {
            if (!state.lat) return alert("Aguarde por sinal GPS...");
            weatherScreen.classList.add('active');
            fetchWeather();
        };

        document.getElementById('closeWeather').onclick = () => weatherScreen.classList.remove('active');

        // Lógica de Sensores (GPS em Knots)
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                state.lat = pos.coords.latitude;
                state.lon = pos.coords.longitude;
                state.speed = pos.coords.speed || 0;

                let knots = state.speed * 1.94384;
                speedEl.innerText = knots > 0.1 ? knots.toFixed(1) : "0.0";
                
                if (pos.coords.heading !== null && state.speed > 0.4) {
                    let h = Math.round(pos.coords.heading);
                    bearingEl.innerText = h.toString().padStart(3, '0') + "°";
                    bearingEl.style.opacity = "1";
                }

                coordsEl.innerText = `LAT: ${state.lat.toFixed(5)} | LON: ${state.lon.toFixed(5)}`;
                infoEl.innerText = `Precisão: ${Math.round(pos.coords.accuracy)}m`;
            }, null, { enableHighAccuracy: true });
        }

        // Bússola magnética (ativa abaixo de 1 nó)
        window.addEventListener('deviceorientationabsolute', (e) => {
            if (state.speed < 0.5 && e.alpha !== null) {
                let h = Math.round(360 - e.alpha);
                bearingEl.innerText = h.toString().padStart(3, '0') + "°";
                bearingEl.style.opacity = "0.5";
            }
        }, true);

        // Wake Lock para ecrã sempre ligado
        async function wake() {
            try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}
        }
        wake();
        document.addEventListener('visibilitychange', () => { if(document.visibilityState==='visible') wake(); });
    </script>
</body>
</html>
