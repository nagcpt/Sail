<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <title>UltraDash</title>
    <style>
        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        /* O segredo da fluidez: transição suave e números tabulares (largura fixa) */
        #speed {
            font-size: 38vw; font-weight: 900;
            transition: all 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            font-variant-numeric: tabular-nums;
        }

        #unit { font-size: 6vw; color: #666; margin-top: -5vh; }
        #bearing { font-size: 15vw; margin-top: 20px; font-weight: 300; }
        
        #status-bar {
            position: absolute; bottom: 20px;
            font-size: 12px; color: #333;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="speed">0</div>
    <div id="unit">KM/H</div>
    <div id="bearing">--</div>
    <div id="status-bar">GPS OFFLINE</div>

    <script>
        let lastSpeed = 0;

        function updateUI(pos) {
            const { speed, heading, accuracy } = pos.coords;
            
            // Filtro de ruído: m/s para km/h + ignorar drifts abaixo de 0.5m/s
            let currentSpeed = (speed && speed > 0.5) ? Math.round(speed * 3.6) : 0;
            
            // Só atualiza o DOM se o valor mudar (otimização de renderização)
            if (currentSpeed !== lastSpeed) {
                document.getElementById('speed').innerText = currentSpeed;
                lastSpeed = currentSpeed;
            }

            if (heading !== null) {
                const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                document.getElementById('bearing').innerText = dirs[Math.round(heading / 45) % 8];
            }

            document.getElementById('status-bar').innerText = `Precisão: ${Math.round(accuracy)}m`;
        }

        navigator.geolocation.watchPosition(updateUI, (err) => console.error(err), {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 2000
        });

        // Wake Lock para manter o ecrã ligado
        if ('wakeLock' in navigator) {
            let lock = null;
            const requestLock = async () => {
                try { lock = await navigator.wakeLock.request('screen'); } catch (e) {}
            };
            requestLock();
            document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestLock(); });
        }
    </script>
</body>
</html>
