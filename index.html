<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>UltraDash Precision</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlVsdHJhRGFzaCBFbGl0ZSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDAwMDAwIiwKICAidGhlbWVfY29sb3ciOiAiIzAwMDAwMCIKfQ==">

    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #222222;
            --bordeaux: #800020;
        }

        body.night-mode {
            --bg: #050000;
            --text: var(--bordeaux);
            --accent: #2a000a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        #dash { text-align: center; width: 100%; user-select: none; }

        .big-font {
            font-weight: 900;
            line-height: 0.85;
            font-variant-numeric: tabular-nums;
            display: block;
        }

        #bearing { font-size: 35vw; } /* Ligeiramente menor para caber o símbolo ° */
        #speed { font-size: 38vw; }

        .separator {
            width: 70%; height: 4px;
            background-color: var(--accent);
            margin: 3vh auto;
            border-radius: 10px;
        }

        #unit {
            font-size: 8vw; font-weight: 300;
            color: var(--accent);
            letter-spacing: 2vw;
            margin-top: 1vh;
        }

        #toggleMode {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text); border: 1px solid var(--accent);
            width: 50px; height: 50px; border-radius: 50%;
            font-size: 20px; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }

        #status-container {
            position: absolute; bottom: 20px;
            text-align: center; width: 100%;
            font-family: monospace;
        }

        #coords {
            font-size: 3.5vw; color: var(--text);
            opacity: 0.8; margin-bottom: 5px;
            letter-spacing: 1px;
        }

        #info {
            font-size: 2.5vw; color: var(--accent);
            text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <button id="toggleMode">🌓</button>

    <div id="dash">
        <div id="bearing" class="big-font">0°</div>
        <div class="separator"></div>
        <div id="speed" class="big-font">0</div>
        <div id="unit">KM/H</div>
    </div>

    <div id="status-container">
        <div id="coords">LAT: --- | LON: ---</div>
        <div id="info">A SINTONIZAR GPS...</div>
    </div>

    <script>
        const speedEl = document.getElementById('speed');
        const bearingEl = document.getElementById('bearing');
        const coordsEl = document.getElementById('coords');
        const infoEl = document.getElementById('info');
        const btnMode = document.getElementById('toggleMode');

        let lastSpeed = 0;

        btnMode.addEventListener('click', () => {
            document.body.classList.toggle('night-mode');
            btnMode.innerText = document.body.classList.contains('night-mode') ? '☀️' : '🌓';
            if (navigator.vibrate) navigator.vibrate(20);
        });

        // Formata os graus para 0-359
        function formatHeading(deg) {
            if (deg === null || deg === undefined) return "0°";
            let d = Math.round(((deg % 360) + 360) % 360);
            return d + "°";
        }

        // Bússola (Alpha) para quando parado
        window.addEventListener('deviceorientationabsolute', (event) => {
            if (lastSpeed < 5) {
                let heading = event.alpha;
                if (heading !== null) {
                    // Invertemos para alinhar o Norte com o topo do telemóvel
                    bearingEl.innerText = formatHeading(360 - heading);
                    bearingEl.style.opacity = "0.5";
                }
            }
        }, true);

        // Atualização Principal
        function updatePosition(pos) {
            const { speed, heading, accuracy, latitude, longitude } = pos.coords;
            
            // Velocidade (m/s para km/h)
            let kmh = (speed && speed > 0.5) ? Math.round(speed * 3.6) : 0;
            lastSpeed = kmh;
            speedEl.innerText = kmh;

            // Rumo via GPS (Prioritário em movimento)
            if (kmh >= 5 && heading !== null) {
                bearingEl.innerText = formatHeading(heading);
                bearingEl.style.opacity = "1";
            }

            // Coordenadas
            coordsEl.innerText = `LAT: ${latitude.toFixed(5)} | LON: ${longitude.toFixed(5)}`;
            infoEl.innerText = `PRECISÃO: ${Math.round(accuracy)}M | GPS ATIVO`;
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(updatePosition, 
                (err) => { infoEl.innerText = "ERRO GPS: " + err.message; }, 
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        }

        // Wake Lock
        let wakeLock = null;
        const requestWakeLock = async () => {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        };
        requestWakeLock();
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') requestWakeLock();
        });
    </script>
</body>
</html>
