<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>UltraDash Marine Pro v2</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlVsdHJhRGFzaCBNYXJpbmUiLAogICJzaG9ydF9uYW1lIjogIlVsdHJhRGFzaCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDAwMDAwIiwKICAidGhlbWVfY29sb3ciOiAiIzAwMDAwMCIKfQ==">

    <style>
        :root { --bg: #000000; --text: #ffffff; --accent: #222222; --bordeaux: #800020; }
        body.night-mode { --bg: #050000; --text: var(--bordeaux); --accent: #2a000a; }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        #dash-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .big-font { font-weight: 900; line-height: 0.85; font-variant-numeric: tabular-nums; display: block; }
        #bearing { font-size: 35vw; }
        #speed { font-size: 38vw; }
        .separator { width: 70%; height: 4px; background-color: var(--accent); margin: 3vh auto; border-radius: 10px; }
        #unit { font-size: 8vw; font-weight: 300; color: var(--accent); letter-spacing: 2vw; }

        .fab {
            position: absolute; width: 55px; height: 55px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.05); color: var(--text);
            border: 1px solid var(--accent); font-size: 22px;
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        #toggleMode { top: 20px; right: 20px; }
        #openWeather { top: 20px; left: 20px; }

        #weather-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        #weather-screen.active { display: flex; }
        .close-btn { align-self: flex-end; padding: 12px 24px; background: var(--bordeaux); color: white; border: none; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }

        h2 { color: var(--bordeaux); margin: 0 0 15px 0; font-size: 1.2rem; text-transform: uppercase; text-align: center; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px 5px; text-align: center; border-bottom: 1px solid var(--accent); }
        th { color: var(--bordeaux); font-size: 0.65rem; }
        .knots { font-weight: bold; color: var(--text); }

        #status-container { position: absolute; bottom: 20px; text-align: center; width: 100%; font-family: monospace; }
        #coords { font-size: 3.5vw; opacity: 0.8; margin-bottom: 5px; }
        #info { font-size: 2.5vw; color: var(--accent); }
    </style>
</head>
<body>

    <button id="toggleMode" class="fab">🌓</button>
    <button id="openWeather" class="fab">⚓</button>

    <div id="dash-screen">
        <div id="bearing" class="big-font">0°</div>
        <div class="separator"></div>
        <div id="speed" class="big-font">0</div>
        <div id="unit">KM/H</div>
        
        <div id="status-container">
            <div id="coords">LAT: --- | LON: ---</div>
            <div id="info">GPS A SINTONIZAR...</div>
        </div>
    </div>

    <div id="weather-screen">
        <button class="close-btn" onclick="toggleWeather()">VOLTAR</button>
        <h2 id="meteo-title">Previsão 12h</h2>
        <div id="weather-content">
            <table>
                <thead>
                    <tr>
                        <th>H</th>
                        <th>Vento (kn)</th>
                        <th>Dir.</th>
                        <th>Onda (m)</th>
                        <th>Dir.</th>
                    </tr>
                </thead>
                <tbody id="forecast-table">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const speedEl = document.getElementById('speed');
        const bearingEl = document.getElementById('bearing');
        const coordsEl = document.getElementById('coords');
        const infoEl = document.getElementById('info');
        const weatherScreen = document.getElementById('weather-screen');
        const tableBody = document.getElementById('forecast-table');
        const meteoTitle = document.getElementById('meteo-title');

        let lastLat = null, lastLon = null, lastSpeed = 0;

        document.getElementById('toggleMode').addEventListener('click', () => {
            document.body.classList.toggle('night-mode');
        });

        function toggleWeather() {
            if (!lastLat || !lastLon) {
                alert("Aguarde pelo sinal GPS antes de consultar a meteorologia.");
                return;
            }
            weatherScreen.classList.toggle('active');
            if (weatherScreen.classList.contains('active')) fetchWeather();
        }
        document.getElementById('openWeather').addEventListener('click', toggleWeather);

        async function fetchWeather() {
            tableBody.innerHTML = '<tr><td colspan="5">A ler sensores...</td></tr>';
            
            try {
                // Tenta primeiro a API Marítima
                const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${lastLat}&longitude=${lastLon}&hourly=wave_height,wave_direction,wind_speed_10m,wind_direction_10m&wind_speed_unit=kn&forecast_days=1`;
                
                let response = await fetch(marineUrl);
                let data = await response.json();

                // Se der erro ou não houver dados horários (estás em terra), tenta a API de terra
                if (data.error || !data.hourly) {
                    meteoTitle.innerText = "Modo Terra (Sem Ondas)";
                    const landUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lastLat}&longitude=${lastLon}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn&forecast_days=1`;
                    response = await fetch(landUrl);
                    data = await response.json();
                } else {
                    meteoTitle.innerText = "Previsão Marítima (12h)";
                }

                if (!data.hourly) throw new Error("Dados indisponíveis");

                const nowIndex = new Date().getHours();
                let html = '';

                for (let i = nowIndex; i < Math.min(nowIndex + 12, data.hourly.time.length); i++) {
                    const time = data.hourly.time[i].split('T')[1];
                    const windSpd = data.hourly.wind_speed_10m[i].toFixed(1);
                    const windDir = data.hourly.wind_direction_10m[i];
                    
                    // Verificação para ondas (podem não existir na API de terra)
                    const waveH = (data.hourly.wave_height && data.hourly.wave_height[i]) ? data.hourly.wave_height[i].toFixed(1) + 'm' : '--';
                    const waveDir = (data.hourly.wave_direction && data.hourly.wave_direction[i]) ? data.hourly.wave_direction[i] + '°' : '--';

                    html += `<tr>
                        <td>${time}</td>
                        <td class="knots">${windSpd}</td>
                        <td>${windDir}°</td>
                        <td>${waveH}</td>
                        <td>${waveDir}</td>
                    </tr>`;
                }
                tableBody.innerHTML = html;
            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="5" style="color:red; padding:20px;">ERRO: ${err.message}<br>Verifica a tua ligação à internet.</td></tr>`;
            }
        }

        function updatePosition(pos) {
            const { speed, heading, latitude, longitude, accuracy } = pos.coords;
            lastLat = latitude;
            lastLon = longitude;
            
            let kmh = (speed && speed > 0.5) ? Math.round(speed * 3.6) : 0;
            lastSpeed = kmh;
            speedEl.innerText = kmh;

            if (kmh >= 5 && heading !== null) {
                bearingEl.innerText = Math.round(heading) + "°";
                bearingEl.style.opacity = "1";
            }

            coordsEl.innerText = `LAT: ${latitude.toFixed(5)} | LON: ${longitude.toFixed(5)}`;
            infoEl.innerText = `PRECISÃO: ${Math.round(accuracy)}M | GPS ATIVO`;
        }

        window.addEventListener('deviceorientationabsolute', (e) => {
            if (lastSpeed < 5 && e.alpha !== null) {
                bearingEl.innerText = Math.round(360 - e.alpha) + "°";
                bearingEl.style.opacity = "0.5";
            }
        }, true);

        if ("geolocation" in navigator) {
