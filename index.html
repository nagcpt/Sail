<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>UltraDash Pro</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlVsdHJhRGFzaCBQcm8iLAogICJzaG9ydF9uYW1lIjogIlVsdHJhRGFzaCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDAwMDAwIiwKICAidGhlbWVfY29sb3ciOiAiIzAwMDAwMCIKfQ==">

    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #444444;
            --bordeaux: #800020;
        }

        body.night-mode {
            --bg: #050000;
            --text: var(--bordeaux);
            --accent: #3d000e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.8s ease, color 0.8s ease;
        }

        /* Contentores */
        #dash-container {
            text-align: center;
            user-select: none;
        }

        #speed {
            font-size: 40vw;
            font-weight: 900;
            line-height: 0.8;
            transition: all 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            font-variant-numeric: tabular-nums;
        }

        #unit {
            font-size: 7vw;
            font-weight: 300;
            color: var(--accent);
            margin-bottom: 2vh;
        }

        #bearing {
            font-size: 18vw;
            font-weight: 400;
            opacity: 0.9;
        }

        /* Botão de Modo Noite */
        #toggleMode {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            backdrop-filter: blur(5px);
        }

        #status-bar {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <button id="toggleMode" title="Alternar Modo Noturno">🌓</button>

    <div id="dash-container">
        <div id="speed">0</div>
        <div id="unit">KM/H</div>
        <div id="bearing">--</div>
    </div>

    <div id="status-bar">A sintonizar GPS...</div>

    <script>
        const speedEl = document.getElementById('speed');
        const bearingEl = document.getElementById('bearing');
        const statusEl = document.getElementById('status-bar');
        const btnMode = document.getElementById('toggleMode');

        let lastSpeed = -1;

        // Alternar Modo Noturno
        btnMode.addEventListener('click', () => {
            document.body.classList.toggle('night-mode');
            btnMode.innerText = document.body.classList.contains('night-mode') ? '☀️' : '🌓';
            if (navigator.vibrate) navigator.vibrate(20);
        });

        // Função de conversão de rumo
        function getCardinals(deg) {
            if (deg === null || deg === undefined) return "--";
            const directions = ['N', 'NE', 'E', 'SE', 'S', 'SO', 'O', 'NO'];
            return directions[Math.round(deg / 45) % 8];
        }

        // Sucesso do GPS
        function onLocationUpdate(pos) {
            const { speed, heading, accuracy } = pos.coords;
            
            // Conversão m/s -> km/h com filtro de ruído (abaixo de 1.8km/h conta como parado)
            let kmh = (speed && speed > 0.5) ? Math.round(speed * 3.6) : 0;
            
            if (kmh !== lastSpeed) {
                speedEl.innerText = kmh;
                lastSpeed = kmh;
            }

            if (heading !== null) {
                bearingEl.innerText = getCardinals(heading);
            }

            statusEl.innerText = `Precisão: ${Math.round(accuracy)}m | GPS Ativo`;
        }

        function onLocationError(err) {
            statusEl.innerText = `Erro: ${err.message}`;
            statusEl.style.color = "red";
        }

        // Ativar GPS de alta performance
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(onLocationUpdate, onLocationError, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000
            });
        } else {
            statusEl.innerText = "GPS Indisponível";
        }

        // Wake Lock (Ecrã sempre ligado)
        let wakeLock = null;
        async function initWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (e) {
                console.log("WakeLock não suportado ou bloqueado.");
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') initWakeLock();
        });

        initWakeLock();

    </script>
</body>
</html>
