<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>UltraDash Pro</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlVsdHJhRGFzaCBQcm8iLAogICJzaG9ydF9uYW1lIjogIlVsdHJhRGFzaCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDAwMDAwIiwKICAidGhlbWVfY29sb3ciOiAiIzAwMDAwMCIKfQ==">

    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #333333;
            --bordeaux: #800020;
        }

        body.night-mode {
            --bg: #050000;
            --text: var(--bordeaux);
            --accent: #3d000e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.6s ease, color 0.6s ease;
        }

        #dash-container {
            text-align: center;
            width: 100%;
            user-select: none;
        }

        /* Rumo e Velocidade com a mesma fonte massiva */
        .big-font {
            font-size: 38vw; 
            font-weight: 900;
            line-height: 0.9;
            font-variant-numeric: tabular-nums;
            transition: all 0.4s ease;
        }

        #bearing {
            margin-bottom: 2vh;
        }

        /* Separador Horizontal */
        .separator {
            width: 60%;
            height: 4px;
            background-color: var(--accent);
            margin: 2vh auto;
            border-radius: 2px;
            transition: background-color 0.6s ease;
        }

        #unit {
            font-size: 8vw;
            font-weight: 300;
            color: var(--accent);
            letter-spacing: 0.5vw;
        }

        #toggleMode {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 100;
        }

        #status-bar {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <button id="toggleMode">🌓</button>

    <div id="dash-container">
        <div id="bearing" class="big-font">--</div>
        
        <div class="separator"></div>
        
        <div id="speed" class="big-font">0</div>
        <div id="unit">KM/H</div>
    </div>

    <div id="status-bar">GPS INITIALIZING...</div>

    <script>
        const speedEl = document.getElementById('speed');
        const bearingEl = document.getElementById('bearing');
        const statusEl = document.getElementById('status-bar');
        const btnMode = document.getElementById('toggleMode');

        let lastSpeed = -1;

        btnMode.addEventListener('click', () => {
            document.body.classList.toggle('night-mode');
            btnMode.innerText = document.body.classList.contains('night-mode') ? '☀️' : '🌓';
            if (navigator.vibrate) navigator.vibrate(25);
        });

        function getCardinals(deg) {
            if (deg === null || deg === undefined) return "--";
            // Direções em Português
            const directions = ['N', 'NE', 'E', 'SE', 'S', 'SO', 'O', 'NO'];
            return directions[Math.round(deg / 45) % 8];
        }

        function onLocationUpdate(pos) {
            const { speed, heading, accuracy } = pos.coords;
            
            // Lógica de velocidade: m/s para km/h
            let kmh = (speed && speed > 0.4) ? Math.round(speed * 3.6) : 0;
            
            if (kmh !== lastSpeed) {
                speedEl.innerText = kmh;
                lastSpeed = kmh;
            }

            // Atualização de Rumo (Heading)
            if (heading !== null && heading !== undefined) {
                bearingEl.innerText = getCardinals(heading);
            } else if (kmh === 0) {
                // Se parado, o GPS raramente dá heading fiável
                bearingEl.style.opacity = "0.3";
            } else {
                bearingEl.style.opacity = "1";
            }

            statusEl.innerText = `ACCURACY: ${Math.round(accuracy)}M | GPS ACTIVE`;
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(onLocationUpdate, (err) => {
                statusEl.innerText = "GPS ERROR: " + err.message;
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        }

        // Wake Lock
        let wakeLock = null;
        async function initWakeLock() {
            try {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch (e) {}
        }
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') initWakeLock();
        });
        initWakeLock();
    </script>
</body>
</html>
